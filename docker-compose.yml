services:
  display-onfire-so:
    image: nginx:alpine
    container_name: display-onfire-so
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - coolify
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.display-onfire-http.entrypoints=http"
      - "traefik.http.routers.display-onfire-http.rule=Host(`display.onfire.so`)"
      - "traefik.http.routers.display-onfire-http.middlewares=display-redirect-https"
      - "traefik.http.middlewares.display-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.display-redirect-https.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.display-onfire-https.entrypoints=https"
      - "traefik.http.routers.display-onfire-https.rule=Host(`display.onfire.so`)"
      - "traefik.http.routers.display-onfire-https.tls=true"
      - "traefik.http.routers.display-onfire-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.display-onfire.loadbalancer.server.port=80"

networks:
  coolify:
    external: true
