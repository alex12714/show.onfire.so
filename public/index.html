<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnFire Display</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- QR/Session Connect Screen -->
        <div id="connect-screen" class="screen active">
            <div class="blob-background">
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
                <div class="blob blob-3"></div>
                <div class="blob blob-4"></div>
            </div>
            <div class="connect-content">
                <div class="logo">
                    <img src="logo.png" alt="OnFire" class="logo-img">
                    <h1>OnFire Display</h1>
                    <p class="subtitle">Scan QR code from the OnFire app to connect</p>
                </div>
                <div class="qr-section">
                    <canvas id="qr-canvas"></canvas>
                    <div id="qr-status" class="status-text">Generating...</div>
                    <div id="qr-timer" class="timer-text"></div>
                </div>
            </div>
        </div>

        <!-- Presentation Screen -->
        <div id="presentation-screen" class="screen">
            <button id="stop-btn" onclick="stopPresentation()" title="Stop presentation">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" fill="#fff"/></svg>
                <span>Stop</span>
            </button>
            <div id="slide-container"></div>
            <div id="slide-indicator">
                <span id="slide-counter">1 / 1</span>
            </div>
        </div>

        <!-- End Screen (split layout: thank-you left, QR right) -->
        <div id="end-screen" class="screen">
            <div class="blob-background">
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
                <div class="blob blob-3"></div>
                <div class="blob blob-4"></div>
            </div>
            <div class="end-split">
                <!-- Left: Thank you message -->
                <div class="end-left">
                    <div class="end-left-inner">
                        <img src="logo.png" alt="OnFire" class="end-logo">
                        <h1 class="end-title">Thank you for using<br>OnFire Messenger</h1>
                        <p class="end-subtitle">Download the app and stay connected</p>
                        <div class="store-buttons">
                            <a href="#" class="store-badge" aria-label="Download on the App Store">
                                <svg viewBox="0 0 120 40" class="store-svg">
                                    <rect width="120" height="40" rx="6" fill="#000"/>
                                    <text x="60" y="14" text-anchor="middle" fill="#fff" font-size="7" font-family="-apple-system, sans-serif">Download on the</text>
                                    <text x="60" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="-apple-system, sans-serif">App Store</text>
                                </svg>
                            </a>
                            <a href="#" class="store-badge" aria-label="Get it on Google Play">
                                <svg viewBox="0 0 135 40" class="store-svg">
                                    <rect width="135" height="40" rx="6" fill="#000"/>
                                    <text x="67" y="14" text-anchor="middle" fill="#fff" font-size="7" font-family="-apple-system, sans-serif">GET IT ON</text>
                                    <text x="67" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="-apple-system, sans-serif">Google Play</text>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
                <!-- Right: QR code ready for next session -->
                <div class="end-right">
                    <div class="end-right-inner">
                        <div class="end-qr-box">
                            <canvas id="end-qr-canvas"></canvas>
                        </div>
                        <p class="end-qr-hint">Scan to start next presentation</p>
                        <div id="end-qr-status" class="status-text">Generating...</div>
                        <div id="end-qr-timer" class="timer-text"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="app.js"></script>
<script>(function(d,t){var BASE_URL="https://support.onfire.so";var g=d.createElement(t),s=d.getElementsByTagName(t)[0];g.src=BASE_URL+"/packs/js/sdk.js";g.defer=true;g.async=true;s.parentNode.insertBefore(g,s);g.onload=function(){window.chatwootSDK.run({websiteToken:'GrLz2w65GENJNALYN4JiyzVz',baseUrl:BASE_URL});};})(document,"script");</script></body>
</html>
